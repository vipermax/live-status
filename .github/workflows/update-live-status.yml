name: update-live-status

# 2026-06-10: 定期実行は Cloudflare Worker (live-status.realtimeearth-yt.workers.dev、
# Cron Trigger 10 分) に移行。GH schedule は新規 repo で間引かれた (実測 0.8 回/h)。
# この workflow は手動 fallback (workflow_dispatch) としてのみ残す — 出力先が
# repo の live.json で Worker の KV とは独立な点に注意 (ページはもう Worker を見ている)。
on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: live-status
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Resolve live status
        env:
          YT_API_KEY: ${{ secrets.YT_API_KEY }}
        run: node resolver.mjs

      - name: Commit live.json if changed
        run: |
          # git diff は未追跡の新規ファイルを検出しないため status --porcelain で判定
          if [ -n "$(git status --porcelain live.json)" ]; then
            git config user.name "live-status-bot"
            git config user.email "actions@users.noreply.github.com"
            git add live.json
            git commit -m "live.json update"
            git pull --rebase
            git push
          fi
