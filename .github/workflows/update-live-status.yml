name: update-live-status

on:
  schedule:
    # */5 は GitHub の schedule キューで間引かれた (2026-06-10、新規 repo は特に劣後) →
    # 10 分間隔 + 混雑する 0/5 分を避けたオフセットに変更。client 側 (app.js v15) が
    # 自己回復するので 10 分鮮度で十分
    - cron: '2,12,22,32,42,52 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: live-status
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Resolve live status
        env:
          YT_API_KEY: ${{ secrets.YT_API_KEY }}
        run: node resolver.mjs

      - name: Commit live.json if changed
        run: |
          # git diff は未追跡の新規ファイルを検出しないため status --porcelain で判定
          if [ -n "$(git status --porcelain live.json)" ]; then
            git config user.name "live-status-bot"
            git config user.email "actions@users.noreply.github.com"
            git add live.json
            git commit -m "live.json update"
            git pull --rebase
            git push
          fi
