name: update-live-status

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: live-status
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Resolve live status
        env:
          YT_API_KEY: ${{ secrets.YT_API_KEY }}
        run: node resolver.mjs

      - name: Commit live.json if changed
        run: |
          # git diff は未追跡の新規ファイルを検出しないため status --porcelain で判定
          if [ -n "$(git status --porcelain live.json)" ]; then
            git config user.name "live-status-bot"
            git config user.email "actions@users.noreply.github.com"
            git add live.json
            git commit -m "live.json update"
            git pull --rebase
            git push
          fi
